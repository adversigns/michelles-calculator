<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Michelle's Calculator</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:hsl(340,40%,97%);--fg:hsl(340,20%,12%);
--primary:hsl(330,65%,55%);--primary-fg:#fff;
--card:hsl(340,35%,98%);--card-fg:hsl(340,20%,12%);
--border:hsl(340,25%,88%);--input-border:hsl(340,20%,78%);
--muted:hsl(340,25%,92%);--muted-fg:hsl(340,10%,45%);
--accent:hsl(340,35%,93%);--secondary:hsl(340,30%,91%);
--destructive:hsl(0,72%,48%);--ring:hsl(330,65%,55%);
--radius:0.625rem;
}
.dark{
--bg:hsl(340,15%,8%);--fg:hsl(340,10%,92%);
--primary:hsl(330,55%,65%);--primary-fg:#fff;
--card:hsl(340,12%,10%);--card-fg:hsl(340,10%,92%);
--border:hsl(340,12%,18%);--input-border:hsl(340,10%,28%);
--muted:hsl(340,10%,20%);--muted-fg:hsl(340,8%,60%);
--accent:hsl(340,15%,18%);--secondary:hsl(340,12%,19%);
--destructive:hsl(0,72%,48%);--ring:hsl(330,55%,65%);
}
body{font-family:'General Sans','Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;min-height:100dvh;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}

/* Header */
.header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--card) 80%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.header-inner{max-width:32rem;margin:0 auto;padding:0 1rem;height:3.5rem;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:0.625rem}
.logo-icon{width:2rem;height:2rem;border-radius:0.5rem;background:var(--primary);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:1.125rem;height:1.125rem;color:var(--primary-fg)}
.logo span{font-weight:600;font-size:0.875rem;letter-spacing:-0.01em}
.icon-btn{width:2rem;height:2rem;border:none;background:transparent;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:var(--fg);transition:background .15s}
.icon-btn:hover{background:var(--muted)}
.icon-btn svg{width:1rem;height:1rem}

/* Main */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.content{width:100%;max-width:28rem;display:flex;flex-direction:column;gap:1.5rem}
.title-section{text-align:center;display:flex;flex-direction:column;gap:0.5rem;align-items:center}
.title-section h1{font-size:1.25rem;font-weight:700;letter-spacing:-0.02em}
.title-section p{font-size:0.875rem;color:var(--muted-fg)}

/* Scan button */
.scan-btn{display:inline-flex;align-items:center;gap:0.375rem;padding:0.375rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius);background:transparent;font-size:0.75rem;font-weight:500;color:var(--fg);transition:background .15s}
.scan-btn:hover{background:var(--muted)}
.scan-btn svg{width:0.875rem;height:0.875rem}

/* Tabs */
.tabs-list{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--muted);border-radius:var(--radius);padding:0.25rem;gap:0.25rem}
.tab-btn{border:none;border-radius:calc(var(--radius) - 2px);padding:0.5rem 0.25rem;font-size:0.75rem;font-weight:500;background:transparent;color:var(--muted-fg);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:0.25rem}
.tab-btn.active{background:var(--primary);color:var(--primary-fg);font-weight:600}
.tab-btn svg{width:0.875rem;height:0.875rem;display:none}
@media(min-width:400px){.tab-btn svg{display:inline-block}}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:1rem 1rem 0.75rem;display:flex;align-items:flex-start;justify-content:space-between}
.card-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:0.5rem}
.card-desc{font-size:0.75rem;color:var(--muted-fg);margin-top:0.25rem}
.card-body{padding:0 1rem 1rem;display:flex;flex-direction:column;gap:1rem}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:0.125rem 0.5rem;border-radius:9999px;font-size:0.75rem;font-weight:400;background:var(--secondary);color:var(--card-fg)}

/* Input group */
.input-group{display:flex;flex-direction:column;gap:0.375rem}
.input-label{font-size:0.875rem;font-weight:500;display:flex;align-items:center;gap:0.375rem}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:0.5rem 2rem 0.5rem 0.75rem;border:1px solid var(--input-border);border-radius:var(--radius);background:transparent;font-size:0.875rem;color:var(--fg);outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s,box-shadow .15s}
.input-wrap input:focus{border-color:var(--ring);box-shadow:0 0 0 2px color-mix(in srgb,var(--ring) 25%,transparent)}
.input-wrap input::placeholder{color:var(--muted-fg)}
.input-unit{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);font-size:0.75rem;color:var(--muted-fg);pointer-events:none}

/* Points display */
.points-display{display:flex;flex-direction:column;align-items:center;padding:1.5rem 0}
.points-circle{width:7rem;height:7rem;border-radius:50%;background:color-mix(in srgb,var(--primary) 10%,transparent);border:2px solid color-mix(in srgb,var(--primary) 30%,transparent);display:flex;align-items:center;justify-content:center;transition:all .3s}
.points-circle.has-value{transform:scale(1);opacity:1}
.points-circle.no-value{transform:scale(0.95);opacity:0.5}
.points-num{font-size:2.5rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;color:var(--primary)}
.points-num.empty{color:var(--muted-fg)}
.points-label{margin-top:0.75rem;font-size:0.875rem;color:var(--muted-fg);font-weight:500}

/* Info card */
.info-card{background:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 80%,var(--border));border-radius:var(--radius);padding:1rem;display:flex;gap:0.75rem}
.info-card svg{width:1rem;height:1rem;color:var(--muted-fg);flex-shrink:0;margin-top:0.125rem}
.info-card p{font-size:0.75rem;color:var(--muted-fg);line-height:1.6}

/* Quick ref */
.quick-ref{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.ref-box{padding:0.75rem;border-radius:var(--radius);background:color-mix(in srgb,var(--muted) 40%,transparent)}
.ref-box h4{font-size:0.75rem;font-weight:500;margin-bottom:0.375rem}
.ref-box.decrease h4{color:hsl(330,65%,50%)}
.dark .ref-box.decrease h4{color:hsl(330,55%,65%)}
.ref-box.increase h4{color:hsl(25,75%,45%)}
.dark .ref-box.increase h4{color:hsl(25,70%,60%)}
.ref-box ul{list-style:none;font-size:0.75rem;color:var(--muted-fg);display:flex;flex-direction:column;gap:0.125rem}

/* Footer */
footer{border-top:1px solid var(--border);padding:1rem;margin-top:2rem;text-align:center}
footer p{font-size:0.75rem;color:var(--muted-fg)}

/* Button primary */
.btn-primary{width:100%;padding:0.5rem 1rem;border:none;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);font-size:0.875rem;font-weight:500;transition:opacity .15s}
.btn-primary:hover{opacity:0.9}
.btn-outline{padding:0.5rem 1rem;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--fg);font-size:0.875rem;font-weight:500;transition:background .15s}
.btn-outline:hover{background:var(--muted)}
.btn-row{display:flex;gap:0.5rem}
.btn-row .btn-primary{flex:1}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .15s}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:28rem;max-height:90dvh;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;animation:slideUp .2s}
.modal-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:0.5rem}
.modal-title svg{width:1rem;height:1rem}
.modal-desc{font-size:0.75rem;color:var(--muted-fg)}

/* Camera */
.camera-wrap{position:relative;width:100%;aspect-ratio:4/3;border-radius:var(--radius);overflow:hidden;background:#000}
.camera-wrap video{width:100%;height:100%;object-fit:cover}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:70%;height:6rem;border:2px solid color-mix(in srgb,var(--primary) 70%,transparent);border-radius:var(--radius);position:relative}
.scan-box::after{content:'';position:absolute;left:0.25rem;right:0.25rem;top:50%;height:2px;background:color-mix(in srgb,var(--primary) 80%,transparent);animation:pulse 1.5s infinite}
.camera-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3)}
.camera-loading svg{width:2rem;height:2rem;color:rgba(255,255,255,0.6);animation:pulse 1.5s infinite}

/* Result found */
.result-banner{display:flex;align-items:flex-start;gap:0.75rem;padding:0.75rem;border-radius:var(--radius);background:color-mix(in srgb,var(--primary) 10%,transparent);border:1px solid color-mix(in srgb,var(--primary) 20%,transparent)}
.result-banner svg{width:1.25rem;height:1.25rem;color:var(--primary);flex-shrink:0;margin-top:0.125rem}
.result-banner .name{font-weight:600;font-size:0.875rem}
.nutrition-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.nutrition-item{padding:0.625rem;border-radius:var(--radius);background:color-mix(in srgb,var(--muted) 50%,transparent)}
.nutrition-item .label{font-size:0.75rem;color:var(--muted-fg)}
.nutrition-item .value{font-size:0.875rem;font-weight:600;font-variant-numeric:tabular-nums}

/* Error banner */
.error-banner{display:flex;align-items:flex-start;gap:0.75rem;padding:0.75rem;border-radius:var(--radius);background:color-mix(in srgb,var(--destructive) 10%,transparent);border:1px solid color-mix(in srgb,var(--destructive) 20%,transparent)}
.error-banner svg{width:1.25rem;height:1.25rem;color:var(--destructive);flex-shrink:0;margin-top:0.125rem}
.error-banner .err-title{font-weight:500;font-size:0.875rem}
.error-banner .err-msg{font-size:0.75rem;color:var(--muted-fg);margin-top:0.125rem}

/* Loading spinner */
.spinner{width:2rem;height:2rem;border:3px solid var(--muted);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 0;gap:0.75rem}
.loading-state p{font-size:0.875rem;color:var(--muted-fg)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(1rem);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>

<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/index.js"></script>
<script>
// Pre-check available barcode detection engines
window.__scanEngine = 'none';
window.__nativeBD = false;
window.__zbarReady = false;
try {
  if ('BarcodeDetector' in window) {
    window.__nativeBD = true;
    window.__scanEngine = 'native';
  }
} catch(e) {}
try {
  if (typeof zbarWasm !== 'undefined' && zbarWasm.scanImageData) {
    window.__zbarReady = true;
    if (window.__scanEngine === 'none') window.__scanEngine = 'zbar';
  }
} catch(e) {}
console.log('[Scanner] Engine:', window.__scanEngine, 'Native:', window.__nativeBD, 'ZBar:', window.__zbarReady);
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// --- SVG Icons ---
const CalcIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
const SunIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
const MoonIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
const ScanIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 7v10"/><path d="M12 7v10"/><path d="M17 7v10"/></svg>;
const ResetIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>;
const InfoIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
const CheckIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
const AlertIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
const CameraIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
const ScaleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
const ZapIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>;
const FlameIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;

// --- Calculation functions ---
function calcClassic(cal, fat, fib) {
  const c = parseFloat(cal); if (isNaN(c)) return null;
  const f = isNaN(parseFloat(fat)) ? 0 : parseFloat(fat);
  const fi = isNaN(parseFloat(fib)) ? 0 : Math.min(parseFloat(fib), 4);
  return Math.max(0, Math.round(c / 50 + f / 12 - fi / 5));
}
function calcSmart(cal, sf, sug, prot) {
  const c = parseFloat(cal); if (isNaN(c)) return null;
  const s = isNaN(parseFloat(sf)) ? 0 : parseFloat(sf);
  const su = isNaN(parseFloat(sug)) ? 0 : parseFloat(sug);
  const p = isNaN(parseFloat(prot)) ? 0 : parseFloat(prot);
  return Math.max(0, Math.round(c * 0.0305 + s * 0.275 + su * 0.12 - p * 0.098));
}
function calcPersonal(prot, carb, fat, fib) {
  const p = parseFloat(prot);
  const c = parseFloat(carb);
  const f = parseFloat(fat);
  const fi = parseFloat(fib);
  if ([p, c, f, fi].every(isNaN)) return null;
  const pv = isNaN(p) ? 0 : p;
  const cv = isNaN(c) ? 0 : c;
  const fv = isNaN(f) ? 0 : f;
  const fiv = isNaN(fi) ? 0 : fi;
  const cal = pv * 4 + cv * 4 + fv * 9;
  return Math.max(0, Math.round(cal / 33 + fv * 0.2 - pv * 0.1 - fiv * 0.1));
}

// --- Open Food Facts lookup ---
async function lookupBarcode(barcode) {
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}?fields=product_name,nutriments,serving_size`);
    const data = await res.json();
    if (data.status !== 1 || !data.product?.nutriments) return null;
    const n = data.product.nutriments;
    const totalFat = n["fat_100g"] ?? n["fat"] ?? 0;
    const satFat = n["saturated-fat_100g"] ?? n["saturated-fat"] ?? 0;
    const unsatFat = Math.max(0, totalFat - satFat);
    return {
      productName: data.product.product_name || "Unknown product",
      calories: Math.round(n["energy-kcal_100g"] ?? n["energy-kcal"] ?? 0),
      fat: Math.round(totalFat * 10) / 10,
      saturatedFat: Math.round(satFat * 10) / 10,
      sugar: Math.round((n["sugars_100g"] ?? n["sugars"] ?? 0) * 10) / 10,
      protein: Math.round((n["proteins_100g"] ?? n["proteins"] ?? 0) * 10) / 10,
      fiber: Math.round((n["fiber_100g"] ?? n["fiber"] ?? 0) * 10) / 10,
      carbohydrates: Math.round((n["carbohydrates_100g"] ?? n["carbohydrates"] ?? 0) * 10) / 10,
      unsaturatedFat: Math.round(unsatFat * 10) / 10,
      servingSize: data.product.serving_size || "per 100g",
    };
  } catch { return null; }
}

// --- NumberInput ---
function NumberInput({ id, label, value, onChange, unit = "g" }) {
  return (
    <div className="input-group">
      <label className="input-label" htmlFor={id}>{label}</label>
      <div className="input-wrap">
        <input id={id} type="number" inputMode="decimal" min="0" step="any" placeholder="0" value={value} onChange={e => onChange(e.target.value)} />
        <span className="input-unit">{unit}</span>
      </div>
    </div>
  );
}

// --- Points Display ---
function PointDisplay({ points, label }) {
  return (
    <div className="points-display">
      <div className={`points-circle ${points !== null ? 'has-value' : 'no-value'}`}>
        <span className={`points-num ${points === null ? 'empty' : ''}`}>{points !== null ? points : '—'}</span>
      </div>
      <p className="points-label">{label}</p>
    </div>
  );
}

// --- Barcode Scanner Modal ---
function BarcodeScanner({ open, onClose, onNutritionFound }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const loopRef = useRef(null);
  const detectorRef = useRef(null);
  const engineRef = useRef(null);
  const [state, setState] = useState("idle");
  const [nutrition, setNutrition] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [cameraReady, setCameraReady] = useState(false);
  const [manualCode, setManualCode] = useState("");
  const [hasCamera, setHasCamera] = useState(true);
  const [debugInfo, setDebugInfo] = useState("");

  const stopCamera = useCallback(() => {
    if (loopRef.current) { clearTimeout(loopRef.current); loopRef.current = null; }
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setCameraReady(false);
  }, []);

  const doLookup = useCallback(async (code) => {
    setState("loading");
    const result = await lookupBarcode(code);
    if (result) { setNutrition(result); setState("found"); }
    else { setErrorMsg(`No nutrition data found for barcode ${code}`); setState("not-found"); }
  }, []);

  const startScanning = useCallback(async () => {
    setState("scanning");
    setCameraReady(false);
    setDebugInfo("Initializing...");
    try {
      // Determine best scan engine
      let engine = "none";
      // Try native BarcodeDetector first (Android Chrome supports this)
      if (typeof window.BarcodeDetector !== "undefined") {
        try {
          const formats = await window.BarcodeDetector.getSupportedFormats();
          if (formats && formats.length > 0) {
            detectorRef.current = new window.BarcodeDetector({
              formats: formats.filter(f => ["ean_13","ean_8","upc_a","upc_e","code_128","code_39"].includes(f))
            });
            engine = "native";
            setDebugInfo("Using native BarcodeDetector");
          }
        } catch(e) {
          setDebugInfo("Native BarcodeDetector failed: " + e.message);
        }
      }
      // Fall back to zbar-wasm
      if (engine === "none" && typeof zbarWasm !== "undefined" && zbarWasm.scanImageData) {
        engine = "zbar";
        setDebugInfo("Using ZBar WASM engine");
      }
      if (engine === "none") {
        setDebugInfo("No scan engine available");
        setState("manual");
        return;
      }
      engineRef.current = engine;

      // Start camera
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        setDebugInfo(engine + ": Camera opened (rear)");
      } catch (camErr) {
        setDebugInfo("Rear cam failed (" + camErr.name + "), trying any...");
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
          setDebugInfo(engine + ": Camera opened (fallback)");
        } catch (camErr2) {
          throw camErr2;
        }
      }
      streamRef.current = stream;
      const video = videoRef.current;
      if (video) {
        video.srcObject = stream;
        // Wait for video to be ready
        await new Promise((resolve, reject) => {
          video.onloadedmetadata = () => {
            video.play().then(resolve).catch(reject);
          };
          setTimeout(() => reject(new Error("Video load timeout")), 5000);
        });
      }
      setCameraReady(true);

      // Create offscreen canvas
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      let frameCount = 0;

      const detect = async () => {
        if (!videoRef.current || !streamRef.current) return;
        const vw = videoRef.current.videoWidth;
        const vh = videoRef.current.videoHeight;
        if (!vw || !vh) {
          loopRef.current = setTimeout(detect, 300);
          return;
        }
        try {
          canvas.width = vw;
          canvas.height = vh;
          ctx.drawImage(videoRef.current, 0, 0, vw, vh);
          frameCount++;

          let foundCode = null;

          if (engineRef.current === "native" && detectorRef.current) {
            // Native BarcodeDetector — pass canvas directly
            const barcodes = await detectorRef.current.detect(canvas);
            if (barcodes.length > 0) {
              foundCode = barcodes[0].rawValue;
            }
          } else {
            // zbar-wasm — use scanImageData
            const imageData = ctx.getImageData(0, 0, vw, vh);
            const symbols = await zbarWasm.scanImageData(imageData);
            if (symbols.length > 0) {
              foundCode = symbols[0].decode("utf-8");
            }
          }

          if (frameCount % 10 === 0) {
            setDebugInfo(`${engineRef.current} | ${vw}x${vh} | Frame ${frameCount}`);
          }

          if (foundCode) {
            setDebugInfo("Found: " + foundCode);
            stopCamera();
            doLookup(foundCode);
            return;
          }
        } catch (e) {
          if (frameCount % 20 === 0) {
            setDebugInfo("Err@" + frameCount + ": " + e.message);
          }
          // If native fails repeatedly, switch to zbar
          if (engineRef.current === "native" && frameCount > 30 && typeof zbarWasm !== "undefined") {
            engineRef.current = "zbar";
            setDebugInfo("Switched to ZBar engine");
          }
        }
        loopRef.current = setTimeout(detect, 150);
      };

      // Small delay for video to produce frames
      loopRef.current = setTimeout(detect, 500);
    } catch (err) {
      if (err?.name === "NotAllowedError" || err?.name === "NotFoundError" || err?.name === "NotReadableError" || err?.name === "OverconstrainedError") {
        setHasCamera(false);
        setDebugInfo("Camera error: " + err.name);
        setState("manual");
      } else {
        setErrorMsg(err?.message || "Could not start camera");
        setDebugInfo("Error: " + err?.message);
        setState("error");
      }
    }
  }, [stopCamera, doLookup]);

  useEffect(() => {
    if (open) {
      setState("idle"); setNutrition(null); setErrorMsg(""); setManualCode("");
      setCameraReady(false); setDebugInfo("");
      startScanning();
    } else { stopCamera(); }
    return stopCamera;
  }, [open]);

  const handleManualLookup = () => {
    const code = manualCode.trim();
    if (code.length >= 8) { stopCamera(); doLookup(code); }
  };

  const handleRetry = () => {
    stopCamera(); setNutrition(null); setErrorMsg(""); setManualCode("");
    startScanning();
  };

  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) { stopCamera(); onClose(); } }}>
      <div className="modal">
        <div>
          <div className="modal-title"><ScanIcon /> Scan Barcode</div>
          <p className="modal-desc">
            {state === "manual" ? "Type or paste a barcode number to look up nutrition info" : "Point your camera at a food barcode to auto-fill nutrition info"}
          </p>
        </div>

        {state === "scanning" && (
          <div>
            <div className="camera-wrap">
              <video ref={videoRef} autoPlay playsInline muted />
              {cameraReady && <div className="scan-overlay"><div className="scan-box"></div></div>}
              {!cameraReady && <div className="camera-loading"><CameraIcon /></div>}
            </div>
            {debugInfo && <p style={{fontSize:'0.625rem',color:'var(--muted-fg)',textAlign:'center',marginTop:'0.375rem',fontFamily:'monospace',opacity:0.7}}>{debugInfo}</p>}
            <p style={{fontSize:'0.75rem',color:'var(--muted-fg)',textAlign:'center',marginTop:'0.375rem'}}>Hold barcode steady in the frame</p>
            <button className="btn-outline" style={{width:'100%',marginTop:'0.5rem'}} onClick={() => { stopCamera(); setState("manual"); }}>Type barcode manually</button>
          </div>
        )}

        {state === "manual" && (
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            {debugInfo && <p style={{fontSize:'0.625rem',color:'var(--muted-fg)',fontFamily:'monospace',opacity:0.7}}>{debugInfo}</p>}
            <div className="input-group">
              <label className="input-label" htmlFor="manual-barcode">Barcode Number</label>
              <div className="input-wrap">
                <input
                  id="manual-barcode"
                  type="text"
                  inputMode="numeric"
                  placeholder="e.g. 3017624010701"
                  value={manualCode}
                  onChange={e => setManualCode(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") handleManualLookup(); }}
                  autoFocus
                />
              </div>
              <p style={{fontSize:'0.75rem',color:'var(--muted-fg)'}}>Enter the number below the barcode on the package</p>
            </div>
            <button className="btn-primary" onClick={handleManualLookup} disabled={manualCode.trim().length < 8}>Look Up</button>
            <p style={{fontSize:'0.75rem',color:'var(--muted-fg)',textAlign:'center'}}>Data sourced from Open Food Facts (per 100g)</p>
          </div>
        )}

        {state === "loading" && (
          <div className="loading-state"><div className="spinner"></div><p>Looking up nutrition info...</p></div>
        )}

        {state === "found" && nutrition && (
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <div className="result-banner">
              <CheckIcon />
              <div>
                <p className="name">{nutrition.productName}</p>
                <span className="badge" style={{marginTop:'0.25rem',display:'inline-block'}}>{nutrition.servingSize}</span>
              </div>
            </div>
            <div className="nutrition-grid">
              <div className="nutrition-item"><p className="label">Calories</p><p className="value">{nutrition.calories} kcal</p></div>
              <div className="nutrition-item"><p className="label">Protein</p><p className="value">{nutrition.protein}g</p></div>
              <div className="nutrition-item"><p className="label">Carbohydrates</p><p className="value">{nutrition.carbohydrates}g</p></div>
              <div className="nutrition-item"><p className="label">Fat</p><p className="value">{nutrition.fat}g</p></div>
              <div className="nutrition-item"><p className="label">Fibre</p><p className="value">{nutrition.fiber}g</p></div>
              <div className="nutrition-item"><p className="label">Sugar</p><p className="value">{nutrition.sugar}g</p></div>
            </div>
            <div className="btn-row">
              <button className="btn-primary" onClick={() => { onNutritionFound(nutrition); onClose(); }}>Use These Values</button>
              <button className="btn-outline" onClick={handleRetry}>Scan Again</button>
            </div>
          </div>
        )}

        {(state === "not-found" || state === "error") && (
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <div className="error-banner">
              <AlertIcon />
              <div>
                <p className="err-title">{state === "not-found" ? "Product Not Found" : "Scanner Error"}</p>
                <p className="err-msg">{errorMsg}</p>
              </div>
            </div>
            {debugInfo && <p style={{fontSize:'0.625rem',color:'var(--muted-fg)',fontFamily:'monospace',opacity:0.7}}>{debugInfo}</p>}
            <button className="btn-primary" onClick={handleRetry}>Try Again</button>
            <button className="btn-outline" onClick={() => { setErrorMsg(""); setState("manual"); }}>Enter barcode manually</button>
          </div>
        )}
      </div>
    </div>
  );
}

// --- Main App ---
function App() {
  const [dark, setDark] = useState(() => typeof window !== "undefined" && window.matchMedia("(prefers-color-scheme: dark)").matches);
  const [system, setSystem] = useState("smartpoints");
  const [scannerOpen, setScannerOpen] = useState(false);

  const [classic, setClassic] = useState({ calories: "", fat: "", fiber: "" });
  const [smart, setSmart] = useState({ calories: "", saturatedFat: "", sugar: "", protein: "" });
  const [personal, setPersonal] = useState({ protein: "", carbohydrates: "", fat: "", fiber: "" });

  useEffect(() => { document.documentElement.classList.toggle("dark", dark); }, [dark]);

  const handleNutrition = useCallback((data) => {
    const s = v => v > 0 ? String(v) : "";
    if (system === "classic") setClassic({ calories: s(data.calories), fat: s(data.fat), fiber: s(data.fiber) });
    else if (system === "smartpoints") setSmart({ calories: s(data.calories), saturatedFat: s(data.saturatedFat), sugar: s(data.sugar), protein: s(data.protein) });
    else setPersonal({ protein: s(data.protein), carbohydrates: s(data.carbohydrates), fat: s(data.fat), fiber: s(data.fiber) });
  }, [system]);

  const resetCurrent = () => {
    if (system === "classic") setClassic({ calories: "", fat: "", fiber: "" });
    else if (system === "smartpoints") setSmart({ calories: "", saturatedFat: "", sugar: "", protein: "" });
    else setPersonal({ protein: "", carbohydrates: "", fat: "", fiber: "" });
  };

  const classicPts = calcClassic(classic.calories, classic.fat, classic.fiber);
  const smartPts = calcSmart(smart.calories, smart.saturatedFat, smart.sugar, smart.protein);
  const personalPts = calcPersonal(personal.protein, personal.carbohydrates, personal.fat, personal.fiber);

  const systems = [
    { key: "classic", label: "Classic", icon: <ScaleIcon />, period: "Pre-2015" },
    { key: "smartpoints", label: "Smart", icon: <ZapIcon />, period: "2015–2021" },
    { key: "personalpoints", label: "Personal", icon: <FlameIcon />, period: "2022+" },
  ];

  return (
    <>
      <header className="header">
        <div className="header-inner">
          <div className="logo">
            <div className="logo-icon"><CalcIcon /></div>
            <span>Michelle's Calculator</span>
          </div>
          <button className="icon-btn" onClick={() => setDark(d => !d)} aria-label="Toggle theme">
            {dark ? <SunIcon /> : <MoonIcon />}
          </button>
        </div>
      </header>

      <main>
        <div className="content">
          <div className="title-section">
            <h1>Michelle's Points Calculator</h1>
            <p>Enter nutrition info or scan a barcode</p>
            <button className="scan-btn" onClick={() => setScannerOpen(true)}><ScanIcon /> Scan Barcode</button>
          </div>

          <BarcodeScanner open={scannerOpen} onClose={() => setScannerOpen(false)} onNutritionFound={handleNutrition} />

          <div className="tabs-list">
            {systems.map(s => (
              <button key={s.key} className={`tab-btn ${system === s.key ? 'active' : ''}`} onClick={() => setSystem(s.key)}>
                {s.icon}<span>{s.label}</span>
              </button>
            ))}
          </div>

          {/* Classic */}
          {system === "classic" && (
            <div className="card">
              <div className="card-header">
                <div>
                  <div className="card-title"><span className="badge">{systems[0].period}</span> Classic Points</div>
                  <p className="card-desc">(Calories / 50) + (Fat / 12) - (Fiber / 5)</p>
                </div>
                <button className="icon-btn" onClick={resetCurrent}><ResetIcon /></button>
              </div>
              <div className="card-body">
                <NumberInput id="c-cal" label="Calories" value={classic.calories} onChange={v => setClassic(p => ({...p, calories: v}))} unit="kcal" />
                <NumberInput id="c-fat" label="Total Fat" value={classic.fat} onChange={v => setClassic(p => ({...p, fat: v}))} />
                <NumberInput id="c-fib" label="Dietary Fiber" value={classic.fiber} onChange={v => setClassic(p => ({...p, fiber: v}))} />
                <PointDisplay points={classicPts} label="Classic Points" />
              </div>
            </div>
          )}

          {/* SmartPoints */}
          {system === "smartpoints" && (
            <div className="card">
              <div className="card-header">
                <div>
                  <div className="card-title"><span className="badge">{systems[1].period}</span> SmartPoints</div>
                  <p className="card-desc">(Cal x .0305) + (Sat Fat x .275) + (Sugar x .12) - (Protein x .098)</p>
                </div>
                <button className="icon-btn" onClick={resetCurrent}><ResetIcon /></button>
              </div>
              <div className="card-body">
                <NumberInput id="s-cal" label="Calories" value={smart.calories} onChange={v => setSmart(p => ({...p, calories: v}))} unit="kcal" />
                <NumberInput id="s-sf" label="Saturated Fat" value={smart.saturatedFat} onChange={v => setSmart(p => ({...p, saturatedFat: v}))} />
                <NumberInput id="s-sug" label="Sugar" value={smart.sugar} onChange={v => setSmart(p => ({...p, sugar: v}))} />
                <NumberInput id="s-prot" label="Protein" value={smart.protein} onChange={v => setSmart(p => ({...p, protein: v}))} />
                <PointDisplay points={smartPts} label="SmartPoints" />
              </div>
            </div>
          )}

          {/* PersonalPoints */}
          {system === "personalpoints" && (
            <div className="card">
              <div className="card-header">
                <div>
                  <div className="card-title"><span className="badge">{systems[2].period}</span> PersonalPoints</div>
                  <p className="card-desc">Protein, carbs, fat, and fibre are all factored in</p>
                </div>
                <button className="icon-btn" onClick={resetCurrent}><ResetIcon /></button>
              </div>
              <div className="card-body">
                <NumberInput id="p-prot" label="Protein" value={personal.protein} onChange={v => setPersonal(p => ({...p, protein: v}))} />
                <NumberInput id="p-carb" label="Carbohydrates" value={personal.carbohydrates} onChange={v => setPersonal(p => ({...p, carbohydrates: v}))} />
                <NumberInput id="p-fat" label="Fat" value={personal.fat} onChange={v => setPersonal(p => ({...p, fat: v}))} />
                <NumberInput id="p-fib" label="Fibre" value={personal.fiber} onChange={v => setPersonal(p => ({...p, fiber: v}))} />
                <PointDisplay points={personalPts} label="PersonalPoints" />
              </div>
            </div>
          )}

          {/* Info */}
          <div className="info-card">
            <InfoIcon />
            <p>These are approximate estimates based on publicly available formulas. The official WW app uses a proprietary algorithm personalised to each member. Fruits and most vegetables are zero-point foods in all systems.</p>
          </div>

          {/* Quick Reference */}
          <div className="card">
            <div className="card-header"><div><div className="card-title" style={{fontSize:'0.875rem'}}>Quick Reference</div></div></div>
            <div className="card-body">
              <div className="quick-ref">
                <div className="ref-box decrease">
                  <h4>Decreases Points</h4>
                  <ul><li>+ Protein</li><li>+ Fiber</li><li>+ Unsaturated fats</li></ul>
                </div>
                <div className="ref-box increase">
                  <h4>Increases Points</h4>
                  <ul><li>+ Calories</li><li>+ Saturated fat</li><li>+ Sugar / added sugar</li></ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer>
        <p>Not affiliated with or endorsed by WW International, Inc.</p>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
